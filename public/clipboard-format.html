<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Processor</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #111827;
      --primary-text: #ffffff;
      --focus: #9ca3af;
    }

    body.theme-light {
      --bg: #f7f7f8;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #111827;
      --primary-text: #ffffff;
      --focus: #9ca3af;
    }

    body.theme-dark {
      --bg: #0b1220;
      --surface: #111827;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --border: #374151;
      --primary: #f3f4f6;
      --primary-text: #111827;
      --focus: #60a5fa;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: light dark;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 16px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    .description {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .theme-control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .theme-control label {
      font-size: 14px;
      color: var(--muted);
    }

    .theme-control select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      min-height: 44px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: var(--primary-text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.98);
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.6;
      border: 1px solid var(--border);
      border-radius: 12px;
      resize: vertical;
      background: var(--surface);
      color: var(--text);
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    textarea:focus,
    button:focus,
    select:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    @media (prefers-color-scheme: dark) {
      body.theme-system {
        --bg: #0b1220;
        --surface: #111827;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --border: #374151;
        --primary: #f3f4f6;
        --primary-text: #111827;
        --focus: #60a5fa;
      }
    }

    @media (prefers-color-scheme: light) {
      body.theme-system {
        --bg: #f7f7f8;
        --surface: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --primary: #111827;
        --primary-text: #ffffff;
        --focus: #9ca3af;
      }
    }

    @media (min-width: 640px) {
      body {
        padding: 24px;
      }

      .app {
        padding: 20px;
      }

      .toolbar {
        grid-template-columns: 220px 1fr;
        align-items: end;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
        margin-bottom: 0;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Clipboard Processor</h1>
    <p class="description">Read text from the clipboard, edit it, and write both plain text and formatted HTML back to the clipboard.</p>

    <div class="toolbar">
      <div class="theme-control">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect" aria-label="Theme selection">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="controls">
        <button id="clipboardRead" type="button">Read from Clipboard</button>
        <button id="clipboardWrite" type="button">Write to Clipboard</button>
      </div>
    </div>

    <textarea id="userInput" placeholder="Enter text here"></textarea>
  </main>

  <script>
    const styleTemplate = 'border: 0px; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; font-variant-numeric: inherit; font-variant-east-asian: inherit; font-variant-alternates: inherit; font-variant-position: inherit; font-variant-emoji: inherit; font-weight: 400; font-stretch: inherit; font-size: 12pt; line-height: inherit; font-family: "Yu Gothic", 游ゴシック, YuGothic, sans-serif, serif, EmojiFont; font-optical-sizing: inherit; font-size-adjust: inherit; font-kerning: inherit; font-feature-settings: inherit; font-variation-settings: inherit; font-language-override: inherit; margin: 0px; padding: 0px; vertical-align: baseline; color: black; letter-spacing: normal; orphans: 2; text-align: start; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background-color: rgb(255, 255, 255); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;';

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/ /g, "&nbsp;")
        .replace(/\t/g, "&nbsp;&nbsp;&nbsp;&nbsp;");
    }

    function applyStyleOverride(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      doc.querySelectorAll("div, span").forEach(el => {
        el.style = styleTemplate;
      });

      return doc.body.innerHTML;
    }

    window.addEventListener("load", () => {
      const textarea = document.getElementById("userInput");
      const themeSelect = document.getElementById("themeSelect");
      const THEME_STORAGE_KEY = "clipboard-ui-theme";

      const applyTheme = (theme) => {
        document.body.classList.remove("theme-light", "theme-dark", "theme-system");

        if (theme === "light") {
          document.body.classList.add("theme-light");
        } else if (theme === "dark") {
          document.body.classList.add("theme-dark");
        } else {
          document.body.classList.add("theme-system");
        }
      };

      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || "system";
      themeSelect.value = savedTheme;
      applyTheme(savedTheme);

      themeSelect.addEventListener("change", () => {
        const selectedTheme = themeSelect.value;
        localStorage.setItem(THEME_STORAGE_KEY, selectedTheme);
        applyTheme(selectedTheme);
      });

      const autoResize = () => {
        textarea.style.height = "auto";
        textarea.style.height = textarea.scrollHeight + "px";
      };

      textarea.addEventListener("input", autoResize);
      autoResize();

      document.getElementById("clipboardRead").addEventListener("click", async () => {
        try {
          const text = await navigator.clipboard.readText();
          textarea.value = text;
          autoResize();
        } catch (err) {
          console.error(err);
          alert("Failed to read from the clipboard: " + err.message);
        }
      });

      document.getElementById("clipboardWrite").addEventListener("click", async () => {
        try {
          const text = textarea.value;
          const lines = text.split(/\r?\n/);

          let outputHtml = lines.map(line => {
            const escaped = escapeHtml(line);
            return escaped.length === 0 ? "<div><br></div>" : `<div>${escaped}</div>`;
          }).join("");

          outputHtml = applyStyleOverride(outputHtml);

          const newClipboardItem = new ClipboardItem({
            "text/html": new Blob([outputHtml], { type: "text/html" }),
            "text/plain": new Blob([text], { type: "text/plain" })
          });

          await navigator.clipboard.write([newClipboardItem]);
          alert("Done.");
        } catch (err) {
          console.error(err);
          alert("Error: " + err.message);
        }
      });
    });
  </script>
</body>
</html>
